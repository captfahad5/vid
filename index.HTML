<!DOCTYPE html>
<html>
<head>
  <title>Aircraft Video Collection</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f9; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; }
    button { padding:6px 10px; cursor:pointer; }
  </style>
</head>
<body>

<h1>✈ Aircraft Videos</h1>

<div id="videoList"></div>

<script>
fetch('videos.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("videoList");
    data.forEach(video => {
      container.innerHTML += `
        <div class="card">
          <h3>${video.aircraft}</h3>
          <p><b>Date:</b> ${video.date}</p>
          <p>${video.description}</p>
          <button onclick="window.open('${video.link}', '_blank')">
            Watch Video
          </button>
        </div>
      `;
    });
  });
</script>

</body>
</html>

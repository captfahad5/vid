<div class="filters">
  <div style="display:flex; flex-direction:column; gap:8px;">
    <!-- Aircraft dropdown -->
    <select id="aircraftFilter" style="width:200px;">
      <option value="">All Aircraft</option>
    </select>

    <!-- Highlight checkbox neatly under aircraft -->
    <label style="display:flex; align-items:center; gap:5px; font-weight: normal; font-size: 14px;">
      <input type="checkbox" id="highlightFilter" style="width:auto; height:auto;">
      Show Only Highlighted
    </label>

    <!-- Other filters in a row -->
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:5px;">
      <select id="monthFilter">
        <option value="">All Months</option>
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
      </select>

      <select id="yearFilter">
        <option value="">All Years</option>
      </select>

      <button onclick="applyFilters()">Apply Filters</button>
      <button onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <div>
    <button onclick="reloadVideos()">🔄 Refresh</button>
  </div>
</div>

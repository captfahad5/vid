<!DOCTYPE html>
<html>
<head>
  <title>Highlight Pulse Test</title>
  <style>
    table { width: 60%; margin: 50px auto; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }

    /* Highlighted row with slow pulsing */
    .highlight { 
      background: #fff7c0; /* base yellow */
      border: 2px solid gold;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      font-weight: bold;
      animation: pulseHighlight 2.5s ease-in-out infinite;
      transition: transform 0.3s ease;
    }

    /* Hover effect */
    .highlight:hover { transform: scale(1.02); }

    @keyframes pulseHighlight {
      0% { background-color: #fff7c0; }
      50% { background-color: #ffffff; }
      100% { background-color: #fff7c0; }
    }
  </style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th>Aircraft</th>
      <th>Date</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody>
    <tr class="highlight">
      <td>Boeing 747</td>
      <td>05-Mar-2026</td>
      <td>Amazing takeoff!</td>
    </tr>
    <tr>
      <td>Airbus A320</td>
      <td>04-Mar-2026</td>
      <td>Landing in rain</td>
    </tr>
    <tr class="highlight">
      <td>Cessna 172</td>
      <td>03-Mar-2026</td>
      <td>Training flight</td>
    </tr>
  </tbody>
</table>

</body>
</html>

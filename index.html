<div class="filters">
  <div>
    <select id="aircraftFilter">
      <option value="">All Aircraft</option>
    </select>
    <select id="monthFilter">
      <option value="">All Months</option>
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
      <option value="6">July</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">October</option>
      <option value="10">November</option>
      <option value="11">December</option>
    </select>
    <select id="yearFilter">
      <option value="">All Years</option>
    </select>
    <button onclick="applyFilters()">Apply Filters</button>
    <button onclick="resetFilters()">Reset</button>

    <!-- ✅ Highlight checkbox right after Reset -->
    <label style="margin-left:5px; font-size:14px;">
      <input type="checkbox" id="highlightFilter">
      Show Only Highlighted
    </label>
  </div>

  <div>
    <button onclick="reloadVideos()">🔄 Refresh</button>
  </div>
</div>
